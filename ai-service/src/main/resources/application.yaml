spring:
  application:
    name: ai-service

  datasource:
    url: jdbc:oracle:thin:@oracle.fiap.com.br:1521/orcl
    username: rm560077
    password: 300903
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 2
      minimum-idle: 1

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.OracleDialect

  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY}
        embedding:
          model: text-embedding-004
server:
  port: 8083

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}


management:
  endpoints:
    web:
      exposure:
        include: health,info